services:
  postgres:
    image: postgres:15-alpine
    container_name: sales_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sales_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sales_password}
      POSTGRES_DB: ${POSTGRES_DB:-sales_db}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sales_user -d sales_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sales_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sales_redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sales_network
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: sales_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4 --log-level info
    environment:
      - DATABASE_URL=postgresql://sales_user:sales_password@postgres:5432/sales_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - LOG_LEVEL=INFO
      - MAX_UPLOAD_SIZE=524288000
      - UPLOAD_DIR=/app/uploads
    volumes:
      - ./app:/app/app
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sales_network
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: sales_worker
    command: celery -A celery_app.celery worker --loglevel=info --concurrency=4 --max-tasks-per-child=50
    environment:
      - DATABASE_URL=postgresql://sales_user:sales_password@postgres:5432/sales_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - LOG_LEVEL=INFO
    volumes:
      - ./app:/app/app
      - ./celery_app:/app/celery_app
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sales_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  flower:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: sales_flower
    command: celery -A celery_app.celery flower --port=5555
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - worker
    networks:
      - sales_network
    restart: unless-stopped

networks:
  sales_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
